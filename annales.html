<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annales IA - Prépa PASS/LAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b' }, accent: { 400:'#34d399',500:'#10b981',600:'#059669' } } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .exam-card { transition: all 0.3s ease; }
    .exam-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(99, 102, 241, 0.15); }
    .pill-btn { transition: all 0.15s ease; }
    .pill-btn.answered { background: #e0e7ff; color: #4338ca; }
    .pill-btn.current { background: #4f46e5; color: #fff; box-shadow: 0 2px 8px rgba(79, 70, 229, 0.4); }
    .pill-btn.unanswered { background: #f1f5f9; color: #94a3b8; }
    .quiz-option-btn { transition: all 0.2s ease; }
    .quiz-option-btn:hover:not(:disabled) { border-color: #818cf8; background: #f5f3ff; }
    .quiz-option-btn.selected { border-color: #6366f1; background: #eef2ff; color: #4338ca; }
    .quiz-option-btn.correct { border-color: #10b981; background: #ecfdf5; color: #065f46; }
    .quiz-option-btn.incorrect { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    .timer-warning { animation: timerPulse 1s ease-in-out infinite; }
    @keyframes timerPulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .year-card { animation: cardIn 0.3s ease-out both; }
    @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body class="bg-slate-50 text-gray-900 antialiased">
  <header id="site-header" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100"></header>

  <div id="annales-app"></div>

  <footer id="site-footer" class="bg-gray-900 text-gray-400 py-12 md:py-16"></footer>

  <script src="js/data.js?v=8"></script>
  <script src="js/app.js?v=10"></script>
  <script src="js/annales.js?v=8"></script>
</body>
</html>

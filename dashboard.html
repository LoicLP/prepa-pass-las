<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau de bord - Prépa PASS/LAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b' }, accent: { 400:'#34d399',500:'#10b981',600:'#059669' } } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dash-gradient-text {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .dash-stat { transition: transform 0.2s ease; }
    .dash-stat:hover { transform: translateY(-2px); }
    .dash-tab { transition: all 0.2s ease; }
    .dash-tab.active { color: #4f46e5; border-color: #4f46e5; }
    .premium-blur { filter: blur(5px); pointer-events: none; user-select: none; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-gray-600 antialiased">
  <header id="site-header" class="bg-white/80 backdrop-blur-lg border-b border-gray-100 fixed top-0 inset-x-0 z-50"></header>

  <!-- Hero simplifié -->
  <section class="gradient-hero noise-overlay dot-grid pt-28 pb-10 md:pt-36 md:pb-14 relative overflow-hidden">
    <div class="blob-1"></div>
    <div class="blob-2"></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 text-center">
      <h1 class="text-4xl sm:text-5xl font-black text-gray-900 leading-[1.1] mb-4">
        Mon <span class="dash-gradient-text">tableau de bord</span>
      </h1>
      <p class="text-lg text-gray-600 leading-relaxed max-w-2xl mx-auto">
        Suivez votre progression, consultez vos historiques et analysez vos performances.
      </p>
    </div>
  </section>

  <!-- Dashboard App -->
  <div id="dashboard-app" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    <div class="text-center py-20">
      <div class="w-10 h-10 border-4 border-primary-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-gray-500">Chargement du tableau de bord...</p>
    </div>
  </div>

  <footer id="site-footer" class="bg-gray-900 text-gray-400 py-16 mt-20"></footer>

  <script src="js/data.js?v=9"></script>
  <script src="js/app.js?v=10"></script>
  <script src="js/dashboard.js?v=1"></script>
</body>
</html>

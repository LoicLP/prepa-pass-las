<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog & Conseils - Prépa PASS/LAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b' }, accent: { 400:'#34d399',500:'#10b981',600:'#059669' } } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
  <header id="site-header" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100"></header>

  <!-- Hero -->
  <section class="gradient-hero pt-28 pb-16 md:pt-36 md:pb-20 relative overflow-hidden">
    <div class="blob-1"></div>
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
      <h1 class="text-3xl md:text-5xl font-black text-gray-900 mb-4">Blog & Conseils</h1>
      <p class="text-gray-600 text-lg max-w-2xl mx-auto">
        Guides, conseils méthodologiques et actualités pour réussir votre PASS/LAS.
      </p>
    </div>
  </section>

  <!-- Category Filter -->
  <section class="py-8">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-wrap gap-2" id="category-filters">
        <button onclick="filterArticles('all')" class="cat-btn px-4 py-2 rounded-full text-sm font-semibold bg-primary-600 text-white transition-colors">Tous</button>
      </div>
    </div>
  </section>

  <!-- Articles grid -->
  <section class="pb-16">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6" id="articles-grid"></div>
    </div>
  </section>

  <!-- Article Modal -->
  <div id="article-modal" class="fixed inset-0 z-50 hidden">
    <div class="modal-backdrop absolute inset-0" onclick="closeArticle()"></div>
    <div class="relative z-10 max-w-3xl mx-auto mt-20 mb-10 mx-4">
      <div class="bg-white rounded-2xl shadow-2xl max-h-[80vh] overflow-y-auto">
        <div class="sticky top-0 bg-white/90 backdrop-blur-md border-b border-gray-100 px-6 py-4 flex items-center justify-between rounded-t-2xl">
          <span id="modal-category" class="px-3 py-1 bg-primary-100 text-primary-700 text-xs font-bold rounded-full"></span>
          <button onclick="closeArticle()" class="p-2 hover:bg-gray-100 rounded-lg transition-colors">
            <svg class="w-5 h-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="px-6 md:px-8 py-6">
          <h2 id="modal-title" class="text-2xl font-black text-gray-900 mb-2"></h2>
          <p id="modal-date" class="text-sm text-gray-400 mb-6"></p>
          <div id="modal-content" class="prose prose-gray max-w-none text-gray-700 leading-relaxed"></div>
        </div>
      </div>
    </div>
  </div>

  <footer id="site-footer" class="bg-gray-900 text-gray-400 py-12 md:py-16"></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    const categoryColors = {
      'Orientation': 'bg-blue-100 text-blue-700',
      'Méthodologie': 'bg-purple-100 text-purple-700',
      'Conseils': 'bg-green-100 text-green-700',
      'Bien-être': 'bg-pink-100 text-pink-700',
      'Actualités': 'bg-amber-100 text-amber-700',
    };

    let currentFilter = 'all';

    function renderArticles(filter) {
      const grid = document.getElementById('articles-grid');
      const articles = filter === 'all' ? BLOG_ARTICLES : BLOG_ARTICLES.filter(a => a.category === filter);

      grid.innerHTML = articles.map(a => {
        const date = new Date(a.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
        const colorClass = categoryColors[a.category] || 'bg-gray-100 text-gray-700';
        return `
          <article class="blog-card bg-white rounded-2xl border border-gray-200 overflow-hidden cursor-pointer" onclick="openArticle(${a.id})">
            <div class="h-2 bg-primary-500"></div>
            <div class="p-6">
              <div class="flex items-center justify-between mb-3">
                <span class="px-3 py-1 ${colorClass} text-xs font-bold rounded-full">${a.category}</span>
                <span class="text-xs text-gray-400">${date}</span>
              </div>
              <h3 class="text-lg font-bold text-gray-900 mb-2 leading-tight">${a.title}</h3>
              <p class="text-sm text-gray-600 leading-relaxed">${a.summary}</p>
              <div class="mt-4 flex items-center gap-1 text-primary-600 text-sm font-semibold">
                Lire l'article
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3"/></svg>
              </div>
            </div>
          </article>
        `;
      }).join('');
    }

    function filterArticles(cat) {
      currentFilter = cat;
      // Update buttons
      document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.classList.remove('bg-primary-600', 'text-white');
        btn.classList.add('bg-white', 'text-gray-700', 'border', 'border-gray-200');
      });
      event.target.classList.remove('bg-white', 'text-gray-700', 'border', 'border-gray-200');
      event.target.classList.add('bg-primary-600', 'text-white');
      renderArticles(cat);
    }

    function openArticle(id) {
      const article = BLOG_ARTICLES.find(a => a.id === id);
      if (!article) return;
      document.getElementById('modal-title').textContent = article.title;
      document.getElementById('modal-category').textContent = article.category;
      document.getElementById('modal-category').className = `px-3 py-1 ${categoryColors[article.category] || 'bg-gray-100 text-gray-700'} text-xs font-bold rounded-full`;
      document.getElementById('modal-date').textContent = new Date(article.date).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
      document.getElementById('modal-content').innerHTML = article.content;
      document.getElementById('article-modal').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeArticle() {
      document.getElementById('article-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    // Close on Escape
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeArticle(); });

    document.addEventListener('DOMContentLoaded', () => {
      // Generate category filters
      const categories = [...new Set(BLOG_ARTICLES.map(a => a.category))];
      const filtersContainer = document.getElementById('category-filters');
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn px-4 py-2 rounded-full text-sm font-semibold bg-white text-gray-700 border border-gray-200 transition-colors';
        btn.textContent = cat;
        btn.onclick = () => filterArticles(cat);
        filtersContainer.appendChild(btn);
      });
      renderArticles('all');
    });
  </script>
</body>
</html>

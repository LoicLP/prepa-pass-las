<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programme PASS/LAS - Prépa PASS/LAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b' }, accent: { 400:'#34d399',500:'#10b981',600:'#059669' } } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-white text-gray-900 antialiased">
  <header id="site-header" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100"></header>

  <!-- Hero -->
  <section class="gradient-hero pt-28 pb-16 md:pt-36 md:pb-20 relative overflow-hidden">
    <div class="blob-1"></div>
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10">
      <div class="inline-flex items-center gap-2 bg-white/80 backdrop-blur px-4 py-2 rounded-full border border-primary-200 mb-6">
        <svg class="w-4 h-4 text-primary-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" /></svg>
        <span class="text-sm font-semibold text-primary-700">Programme complet</span>
      </div>
      <h1 class="text-3xl md:text-5xl font-black text-gray-900 mb-4">Le programme PASS/LAS</h1>
      <p class="text-gray-600 text-lg max-w-2xl mx-auto">
        Retrouvez le détail des 6 Unités d'Enseignement au programme de la première année des études de santé.
      </p>
    </div>
  </section>

  <!-- UE List -->
  <section class="py-16 md:py-20">
    <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8" id="programme-list"></div>
  </section>

  <!-- CTA -->
  <section class="py-16 gradient-dark text-white">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
      <h2 class="text-2xl md:text-3xl font-black mb-4">Prêt à tester vos connaissances ?</h2>
      <p class="text-primary-200 text-lg mb-8">Entraînez-vous sur chaque matière avec nos QCM illimités.</p>
      <a href="qcm.html" class="inline-flex items-center gap-2 px-8 py-4 bg-primary-500 text-white font-bold rounded-2xl hover:bg-primary-400 transition-colors shadow-xl">
        Commencer un QCM
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" /></svg>
      </a>
    </div>
  </section>

  <footer id="site-footer" class="bg-gray-900 text-gray-400 py-12 md:py-16"></footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('programme-list');
      container.innerHTML = PROGRAMME_DATA.map((ue, i) => `
        <div class="mb-12 ${i > 0 ? 'pt-12 border-t border-gray-200' : ''}" id="ue-${ue.id}">
          <div class="flex flex-col md:flex-row md:items-start gap-6">
            <div class="w-16 h-16 bg-${ue.color}-50 rounded-2xl flex items-center justify-center shrink-0 text-${ue.color}-600">
              ${ue.icon}
            </div>
            <div class="flex-1">
              <div class="flex flex-wrap items-center gap-3 mb-3">
                <h2 class="text-2xl font-black text-gray-900">${ue.name}</h2>
                <span class="px-3 py-1 bg-primary-100 text-primary-700 text-xs font-bold rounded-full">Coeff. ${ue.coeff}</span>
                <span class="px-3 py-1 bg-gray-100 text-gray-600 text-xs font-bold rounded-full">${ue.hours}h de cours</span>
              </div>
              <p class="text-gray-600 mb-5 leading-relaxed">${ue.description}</p>
              <div class="bg-gray-50 rounded-xl p-5 mb-5">
                <h3 class="text-sm font-bold text-gray-900 uppercase tracking-wider mb-3">Thèmes abordés</h3>
                <ul class="grid sm:grid-cols-2 gap-2">
                  ${ue.topics.map(t => `
                    <li class="flex items-start gap-2 text-sm text-gray-700">
                      <svg class="w-4 h-4 text-primary-500 shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" /></svg>
                      ${t}
                    </li>
                  `).join('')}
                </ul>
              </div>
              <a href="qcm.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-primary-600 text-white text-sm font-semibold rounded-xl hover:bg-primary-700 transition-colors">
                S'entraîner en ${ue.name}
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" /></svg>
              </a>
            </div>
          </div>
        </div>
      `).join('');
    });
  </script>
</body>
</html>

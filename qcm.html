<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QCM d'entraînement - Prépa PASS/LAS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81',950:'#1e1b4b' }, accent: { 400:'#34d399',500:'#10b981',600:'#059669' } } } } }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .qcm-gradient-text {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 50%, #6366f1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .qcm-stat { transition: transform 0.2s ease; }
    .qcm-stat:hover { transform: translateY(-2px); }
    .qcm-float { animation: qcmFloat 5s ease-in-out infinite; }
    @keyframes qcmFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .qcm-float-delay { animation-delay: 1.5s; }
    .qcm-card { transition: all 0.3s ease; }
    .qcm-card:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(99, 102, 241, 0.15); }
    .quiz-option-btn { transition: all 0.2s ease; }
    .quiz-option-btn:hover:not(:disabled) { border-color: #818cf8; background: #f5f3ff; }
    .quiz-option-btn.selected { border-color: #6366f1; background: #eef2ff; color: #4338ca; }
    .quiz-option-btn.correct { border-color: #10b981; background: #ecfdf5; color: #065f46; }
    .quiz-option-btn.incorrect { border-color: #ef4444; background: #fef2f2; color: #991b1b; }
    .count-pill { transition: all 0.15s ease; cursor: pointer; }
    .count-pill.active { background: #4f46e5; color: #fff; border-color: #4f46e5 !important; box-shadow: 0 2px 8px rgba(79, 70, 229, 0.3); }
    .topic-card { transition: all 0.2s ease; cursor: pointer; }
    .topic-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99, 102, 241, 0.12); border-color: #a5b4fc; }
    .tab-btn { transition: all 0.15s ease; }
    .tab-btn.active { color: #4f46e5; border-bottom-color: #4f46e5; font-weight: 700; }
    .filter-pill { transition: all 0.15s ease; cursor: pointer; }
    .filter-pill.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    .loading-pulse {
      animation: loadingPulse 2s ease-in-out infinite;
    }
    @keyframes loadingPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(99,102,241,0.3); }
      50% { transform: scale(1.05); box-shadow: 0 0 20px 8px rgba(99,102,241,0.15); }
    }
    /* View transitions */
    #qcm-app { transition: opacity 0.25s ease, transform 0.25s ease; }
    .qcm-view-exit { opacity: 0; transform: translateY(8px); }
    .qcm-view-enter { animation: qcmViewEnter 0.35s ease-out forwards; }
    @keyframes qcmViewEnter { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    /* Question pills */
    .pill-btn { transition: all 0.15s ease; }
    .pill-btn.answered-correct { background: #d1fae5; color: #065f46; }
    .pill-btn.answered-incorrect { background: #fee2e2; color: #991b1b; }
    .pill-btn.current { background: #4f46e5; color: #fff; box-shadow: 0 2px 8px rgba(79,70,229,0.4); }
    .pill-btn.unanswered { background: #f1f5f9; color: #94a3b8; }
    /* Explanation slide-in */
    .explanation-reveal { animation: explanationSlideIn 0.4s ease-out forwards; }
    @keyframes explanationSlideIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    /* Streak badge */
    .streak-badge { animation: streakPop 0.3s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes streakPop { from { transform:scale(0.5); opacity:0; } to { transform:scale(1); opacity:1; } }
    /* Results filter */
    .results-filter { border: 2px solid #e5e7eb; background: white; color: #6b7280; transition: all 0.15s ease; cursor: pointer; }
    .results-filter.active { border-color: #4f46e5; background: #eef2ff; color: #4f46e5; }
    /* Modals */
    .confirm-modal-enter { animation: modalEnter 0.25s ease-out; }
    @keyframes modalEnter { from { opacity:0; transform:scale(0.95) translateY(8px); } to { opacity:1; transform:scale(1) translateY(0); } }
    /* Staggered option entrance */
    .option-entrance { animation: optionSlideIn 0.3s ease-out both; }
    @keyframes optionSlideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
    /* Answer feedback animations */
    .quiz-option-btn.correct { animation: correctBounce 0.4s ease; }
    @keyframes correctBounce { 0%{transform:scale(1)} 30%{transform:scale(1.02)} 60%{transform:scale(0.98)} 100%{transform:scale(1)} }
    .quiz-option-btn.incorrect { animation: incorrectShake 0.4s ease; }
    @keyframes incorrectShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-4px)} 40%{transform:translateX(4px)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)} }
  </style>
</head>
<body class="bg-slate-50 text-gray-900 antialiased">
  <header id="site-header" class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-gray-100"></header>

  <div id="qcm-app"></div>

  <footer id="site-footer" class="bg-gray-900 text-gray-400 py-12 md:py-16"></footer>

  <script src="js/data.js?v=9"></script>
  <script src="js/app.js?v=10"></script>
  <script src="js/qcm.js?v=12"></script>
</body>
</html>
